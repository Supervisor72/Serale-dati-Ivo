<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Serale — DML Italia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --surface:   #151820;
    --border:    #252a36;
    --border-hi: #3a4155;
    --accent:    #e8b84b;
    --accent2:   #f0d080;
    --text:      #e4e8f0;
    --muted:     #7a8299;
    --danger:    #e05252;
    --wa-green:  #25d366;
    --radius:    10px;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
  }

  header {
    width: 100%;
    max-width: 520px;
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .logo-badge {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 13px;
    color: #0d0f14;
  }

  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -.02em; }
  header p { font-size: 13px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono', monospace; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    width: 100%;
    max-width: 520px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), #e07b2a, var(--accent));
  }

  .date-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1a1d27;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 28px;
    font-family: 'DM Mono', monospace;
  }

  .date-strip span { font-size: 12px; color: var(--muted); }
  .date-strip strong { font-size: 13px; color: var(--accent); font-weight: 500; }

  .field-group { display: flex; flex-direction: column; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  select, input[type="number"] {
    background: #1a1d27;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 12px 14px;
    width: 100%;
    outline: none;
  }

  select:focus, input:focus { border-color: var(--accent); }

  .divider { height: 1px; background: var(--border); margin: 24px 0; }
  .num-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .num-grid .wide { grid-column: 1 / -1; }

  .btn-genera {
    width: 100%;
    padding: 16px;
    margin-top: 28px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    font-weight: 700;
    cursor: pointer;
  }

  #result-box {
    margin-top: 20px;
    background: #0d1117;
    border: 1px solid var(--border-hi);
    border-radius: var(--radius);
    display: none;
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px;
    border-bottom: 1px solid var(--border-hi);
  }

  .btn-wa {
    background: var(--wa-green);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
  }

  #msg-output {
    padding: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.5;
    color: #e4e8f0;
    white-space: pre-wrap;
  }

  @media (max-width: 440px) { .num-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo-badge">DML</div>
    <h1>Report Serale</h1>
  </div>
  <p>DML Italia — Gestione Chiusura</p>
</header>

<div class="card">
  <div class="date-strip">
    <span>Oggi è il</span>
    <strong id="today-date">—</strong>
  </div>

  <div class="field-group">
    <div class="field">
      <label>Punto vendita</label>
      <select id="pv">
        <option value="">— Seleziona —</option>
        <option value="Fano">Fano</option>
        <option value="Monsano">Monsano</option>
        <option value="Osimo">Osimo</option>
        <option value="Macerata">Macerata</option>
        <option value="Civitanova">Civitanova</option>
        <option value="Pesaro">Pesaro</option>
        <option value="Foligno">Foligno</option>
      </select>
    </div>

    <div class="divider"></div>

    <div class="num-grid">
      <div class="field">
        <label>Estendo (pz)</label>
        <input type="number" id="estendo" value="0">
      </div>
      <div class="field">
        <label>MLG (pz)</label>
        <input type="number" id="mlg" value="0">
      </div>
      <div class="field">
        <label>OLED (pz)</label>
        <input type="number" id="oled" value="0">
      </div>
      <div class="field">
        <label>AEG (pz)</label>
        <input type="number" id="aeg" value="0">
      </div>
      <div class="field wide">
        <label>Fatturato fuori griglia (€)</label>
        <input type="number" id="fuori" step="0.01" value="0">
      </div>
    </div>
  </div>

  <button class="btn-genera" onclick="generaMessaggio()">Genera Report</button>

  <div id="result-box">
    <div class="result-header">
      <span style="font-size: 11px; color: var(--muted)">Anteprima</span>
      <button class="btn-wa" onclick="inviaWhatsApp()">Invia su WhatsApp</button>
    </div>
    <pre id="msg-output"></pre>
  </div>
</div>

<script>
  (function() {
    const d = new Date();
    document.getElementById('today-date').textContent = d.toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  })();

  function generaMessaggio() {
    const pv = document.getElementById('pv').value;
    if (!pv) { alert("Seleziona il punto vendita!"); return; }

    const estendo = document.getElementById('estendo').value || '0';
    const mlg = document.getElementById('mlg').value || '0';
    const oled = document.getElementById('oled').value || '0';
    const aeg = document.getElementById('aeg').value || '0';
    const fuori = parseFloat(document.getElementById('fuori').value || 0).toFixed(2);
    const today = new Date().toLocaleDateString('it-IT');

    // Il nuovo schema richiesto
    const msg = 
`📊 REPORT SERALE
📍 Punto vendita: ${pv}
📅 Data: ${today}

▪️ Estendo: ${estendo} pz
▪️ Mlg: ${mlg} pz
▪️ Oled: ${oled} pz
▪️ Aeg: ${aeg} pz
▪️ Venduto F.g.: € ${fuori}`;

    document.getElementById('msg-output').textContent = msg;
    document.getElementById('result-box').style.display = 'block';
  }

  function inviaWhatsApp() {
    const testo = document.getElementById('msg-output').textContent;
    window.open("https://wa.me/?text=" + encodeURIComponent(testo), '_blank');
  }
</script>

</body>
</html>
